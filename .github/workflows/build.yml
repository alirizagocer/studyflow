name: StudyFlow Build

on:
push:
tags:
- "v*"          # Sadece v1.0.0 gibi tag pushlandığında çalışır
workflow_dispatch:  # GitHub arayüzünden elle de başlatılabilir

jobs:
build:
strategy:
matrix:
include:
- os: windows-latest
platform: win
artifact: "dist-electron/*.exe"
- os: macos-latest
platform: mac
artifact: "dist-electron/*.dmg"
- os: ubuntu-latest
platform: linux
artifact: "dist-electron/*.AppImage"

runs-on: ${{ matrix.os }}

steps:
# ── 1. Kodu çek ──────────────────────────────
- name: Checkout
uses: actions/checkout@v4

# ── 2. Node.js kur ───────────────────────────
- name: Node.js 20 kur
uses: actions/setup-node@v4
with:
node-version: 20
cache: "npm"
cache-dependency-path: frontend/package-lock.json

# ── 3. Python kur ────────────────────────────
- name: Python 3.11 kur
uses: actions/setup-python@v5
with:
python-version: "3.11"

# ── 4. Backend bağımlılıklarını kur ──────────
- name: Backend bağımlılıkları
run: |
cd backend
pip install -r requirements.txt
pip install pyinstaller

# ── 5. Backend'i tek dosyaya derle (PyInstaller) ──
- name: Backend derle
run: |
cd backend
pyinstaller --onefile --name studyflow-backend app/main.py

# ── 6. Derlenen backend'i frontend'e taşı ───
- name: Backend'i kopyala
shell: bash
run: |
mkdir -p frontend/backend-bin
if [ "${{ matrix.platform }}" == "win" ]; then
    cp backend/dist/studyflow-backend.exe frontend/backend-bin/
    else
        cp backend/dist/studyflow-backend frontend/backend-bin/
        fi
        
        # ── 7. Frontend bağımlılıklarını kur ─────────
        - name: Frontend bağımlılıkları
        run: |
        cd frontend
        npm ci
        
        # ── 8. Electron uygulamasını derle ───────────
        - name: Electron derle
        env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
        cd frontend
        npm run electron:build -- --${{ matrix.platform }}
        
        # ── 9. Üretilen dosyayı yükle ────────────────
        - name: Artifact yükle
        uses: actions/upload-artifact@v4
        with:
        name: StudyFlow-${{ matrix.platform }}
        path: frontend/${{ matrix.artifact }}
        if-no-files-found: warn
            
            # ── Tüm platformlar bitince Release oluştur ──────
            release:
            needs: build
            runs-on: ubuntu-latest
            if: startsWith(github.ref, 'refs/tags/')
                
                steps:
                - name: Artifactleri indir
                uses: actions/download-artifact@v4
                with:
                path: artifacts
                
                - name: GitHub Release oluştur
                uses: softprops/action-gh-release@v2
                with:
                files: artifacts/**/*
                generate_release_notes: true
                env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
