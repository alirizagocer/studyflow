name: StudyFlow Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Backend bagimliliklar
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Backend derle
        run: |
          cd backend
          pyinstaller --onefile --name studyflow-backend app/main.py

      - name: Backend kopyala Windows
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          mkdir -p frontend/backend-bin
          cp backend/dist/studyflow-backend.exe frontend/backend-bin/

      - name: Backend kopyala Mac Linux
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p frontend/backend-bin
          cp backend/dist/studyflow-backend frontend/backend-bin/

      - name: Frontend bagimliliklar
        run: |
          cd frontend
          npm ci

      - name: Electron derle
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd frontend
          npm run electron:build -- --${{ matrix.platform }}

      - name: Artifact yukle
        uses: actions/upload-artifact@v4
        with:
          name: StudyFlow-${{ matrix.platform }}
          path: frontend/dist-electron/
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Artifactleri indir
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Release olustur
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
